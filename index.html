<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Normas" />
  <meta name="description" content="Monitor diário de AS9100, ISO 9001, ISO 14001 e RBAC 145" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Monitor de Normas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #070d1a;
      --surface:  #0f1e38;
      --card:     #132040;
      --border:   rgba(99,155,255,0.13);
      --accent:   #2563eb;
      --accent2:  #38bdf8;
      --text:     #e8f0fe;
      --muted:    #6b89b4;
      --faint:    #2a3f6a;
      --green:    #22c55e;
      --yellow:   #eab308;
      --red:      #ef4444;
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(7,13,26,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0) 0 0;
    }
    .header-inner {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
    }
    .header-icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
    .header-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-date  {
      margin-left: auto;
      font-size: 11px; color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px;
      white-space: nowrap;
    }

    /* ── MAIN ── */
    .main { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }

    /* ── NORMA CARD ── */
    .norm-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .norm-card.expanded {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.15);
    }
    .norm-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .norm-tag {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 7px;
      padding: 3px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500;
      color: #93c5fd; flex-shrink: 0;
    }
    .norm-info { flex: 1; min-width: 0; }
    .norm-version { font-size: 14px; font-weight: 700; }
    .norm-rev     { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .norm-chevron {
      color: var(--muted); font-size: 18px;
      transition: transform 0.25s; flex-shrink: 0;
    }
    .norm-card.expanded .norm-chevron { transform: rotate(180deg); }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge-vigente    { background:#dcfce7; color:#15803d; }
    .badge-dot-v      { background: var(--green); }
    .badge-revisao    { background:#fef9c3; color:#a16207; }
    .badge-dot-r      { background: var(--yellow); }
    .badge-substituida{ background:#fee2e2; color:#b91c1c; }
    .badge-dot-s      { background: var(--red); }

    /* ── DETAIL PANEL ── */
    .detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px 18px;
      background: rgba(59,130,246,0.04);
      animation: slideDown 0.2s ease;
    }
    .norm-card.expanded .detail { display: block; }

    @keyframes slideDown {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:none; }
    }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 14px;
    }
    .detail-item {
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 11px 13px;
    }
    .detail-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .detail-value { font-size: 13px; font-weight: 600; color: var(--text); }

    .detail-link {
      display: flex; align-items: center; gap: 8px;
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 10px; padding: 11px 14px;
      text-decoration: none; color: #93c5fd;
      font-size: 12px; font-weight: 600;
      margin-bottom: 12px;
    }
    .detail-link:active { opacity: 0.7; }

    .detail-note {
      background: rgba(234,179,8,0.08);
      border: 1px solid rgba(234,179,8,0.2);
      border-radius: 10px; padding: 11px 13px;
      font-size: 12px; color: #fcd34d; line-height: 1.5;
    }

    /* ── EMAIL BTN ── */
    .fab {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border: none; border-radius: 50px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 700;
      padding: 15px 28px;
      display: flex; align-items: center; gap: 9px;
      box-shadow: 0 8px 32px rgba(37,99,235,0.45);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:active {
      transform: translateX(-50%) scale(0.96);
      box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: flex-end; justify-content: center;
      padding: 0;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 28px 22px calc(28px + env(safe-area-inset-bottom, 0px));
      width: 100%; max-width: 600px;
      animation: slideUp 0.28s cubic-bezier(.32,1.2,.5,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: none; }
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--faint); margin: 0 auto 22px;
    }
    .modal-title {
      font-size: 17px; font-weight: 800; margin-bottom: 4px;
    }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .modal-preview {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--muted);
      line-height: 1.7; max-height: 180px;
      overflow-y: auto; margin-bottom: 20px;
      white-space: pre-wrap;
    }
    .modal-btn {
      width: 100%; border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      padding: 16px; cursor: pointer; margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    .modal-btn:active { opacity: 0.8; }
    .modal-btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: #fff;
    }
    .modal-btn-cancel {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }
    .modal-success {
      display: none;
      text-align: center; padding: 12px 0;
      color: #86efac; font-weight: 700; font-size: 15px;
    }

    /* ── INSTALL BANNER ── */
    .install-banner {
      display: none;
      background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(14,165,233,0.15));
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 18px;
      align-items: center; gap: 12px;
    }
    .install-banner.show { display: flex; }
    .install-banner-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; }
    .install-banner-btn {
      background: var(--accent); border: none; border-radius: 9px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700;
      padding: 9px 16px; cursor: pointer; flex-shrink: 0;
    }
  </style>

</head>
<body>

<!-- HEADER -->

<header class="header">
  <div class="header-inner">
    <div class="header-icon">✈</div>
    <div>
      <div class="header-title">Monitor de Normas</div>
      <div class="header-sub">AS9100 · ISO 9001 · ISO 14001 · RBAC 145</div>
    </div>
    <div class="header-date" id="headerDate">—</div>
  </div>
</header>

<!-- MAIN -->

<main class="main">

  <!-- Install banner (Android Chrome) -->

  <div class="install-banner" id="installBanner">
    <div class="install-banner-text">📲 <strong>Instale como app</strong> no seu celular para acesso rápido!</div>
    <button class="install-banner-btn" id="installBtn">Instalar</button>
  </div>

  <!-- Norm cards (generated by JS) -->

  <div id="normCards"></div>

</main>

<!-- FAB -->

<button class="fab" onclick="openModal()">
  <span>📧</span> Enviar Relatório
</button>

<!-- EMAIL MODAL -->

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Enviar Relatório por E-mail</div>
    <div class="modal-sub">Para: rmartins@ael.com.br</div>
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-success" id="modalSuccess">✓ Cliente de e-mail aberto! Confirme o envio.</div>
    <button class="modal-btn modal-btn-primary" id="sendBtn" onclick="sendEmail()">📨 Abrir no cliente de e-mail</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModalDirect()">Fechar</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const NORMAS = [
  {
    id: "AS9100",
    tag: "AS9100",
    descricao: "Quality Management Systems – Aviation, Space & Defense",
    orgao: "SAE International / IAQG",
    versao: "AS9100 Rev D (2016)",
    revisao: "20/09/2016",
    proxima: "IA9100 prevista para 2026",
    status: "Vigente",
    url: "https://www.sae.org/standards/content/as9100d/",
    nota: "Nova versão IA9100 em desenvolvimento pela IAQG, publicação prevista 2026.",
  },
  {
    id: "ISO9001",
    tag: "ISO 9001",
    descricao: "Quality Management Systems – Requirements",
    orgao: "ISO – International Organization for Standardization",
    versao: "ISO 9001:2015 + Amd 2024",
    revisao: "09/2015 | Emenda: 2024",
    proxima: "ISO 9001:2026 (set/2026)",
    status: "Em Revisão",
    url: "https://www.iso.org/standard/62085.html",
    nota: "Revisão em andamento pelo ISO/TC 176. Nova versão esperada set/2026.",
  },
  {
    id: "ISO14001",
    tag: "ISO 14001",
    descricao: "Environmental Management Systems – Requirements",
    orgao: "ISO – International Organization for Standardization",
    versao: "ISO 14001:2015",
    revisao: "09/2015",
    proxima: "Prevista início 2026",
    status: "Em Revisão",
    url: "https://www.iso.org/standard/60857.html",
    nota: "Revisão esperada para 2026, foco em sustentabilidade ampliada.",
  },
  {
    id: "RBAC145",
    tag: "RBAC 145",
    descricao: "Organizações de Manutenção de Produtos Aeronáuticos",
    orgao: "ANAC – Agência Nacional de Aviação Civil",
    versao: "Emenda nº 09 (2023)",
    revisao: "2023",
    proxima: "Não informado",
    status: "Vigente",
    url: "https://www.anac.gov.br/assuntos/legislacao/legislacao-1/rbha-e-rbac/rbac/rbac-145",
    nota: "Emenda nº 09 publicada em 2023 pela ANAC. Consulte o site oficial para detalhes.",
  },
];

const STATUS_CLASS = {
  "Vigente":    { badge: "badge-vigente",     dot: "badge-dot-v" },
  "Em Revisão": { badge: "badge-revisao",     dot: "badge-dot-r" },
  "Substituída":{ badge: "badge-substituida", dot: "badge-dot-s" },
};

function badgeHTML(status) {
  const c = STATUS_CLASS[status] || STATUS_CLASS["Em Revisão"];
  return `<span class="badge ${c.badge}">
    <span class="badge-dot ${c.dot}"></span>${status}
  </span>`;
}

// ── RENDER CARDS ──────────────────────────────────────
const hoje = new Date().toLocaleDateString("pt-BR");
document.getElementById("headerDate").textContent = hoje;

const container = document.getElementById("normCards");
NORMAS.forEach(n => {
  const card = document.createElement("div");
  card.className = "norm-card";
  card.id = "card-" + n.id;
  card.innerHTML = `
    <div class="norm-header" onclick="toggle('${n.id}')">
      <div class="norm-tag">${n.tag}</div>
      <div class="norm-info">
        <div class="norm-version">${n.versao}</div>
        <div class="norm-rev">Revisão: ${n.revisao}</div>
      </div>
      ${badgeHTML(n.status)}
      <span class="norm-chevron">⌄</span>
    </div>
    <div class="detail">
      <div class="detail-grid">
        <div class="detail-item" style="grid-column:1/-1">
          <div class="detail-label">Órgão Responsável</div>
          <div class="detail-value">${n.orgao}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Versão Atual</div>
          <div class="detail-value">${n.versao}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Última Revisão</div>
          <div class="detail-value">${n.revisao}</div>
        </div>
        <div class="detail-item" style="grid-column:1/-1">
          <div class="detail-label">Próxima Revisão Esperada</div>
          <div class="detail-value">${n.proxima}</div>
        </div>
      </div>
      <a class="detail-link" href="${n.url}" target="_blank" rel="noreferrer">
        🔗 Acessar site oficial &rarr;
      </a>
      ${n.nota ? `<div class="detail-note">⚠ ${n.nota}</div>` : ""}
    </div>`;
  container.appendChild(card);
});

function toggle(id) {
  const card = document.getElementById("card-" + id);
  card.classList.toggle("expanded");
}

// ── EMAIL MODAL ───────────────────────────────────────
function buildEmailBody() {
  const lines = NORMAS.map(n =>
    `• ${n.tag} | ${n.versao} | Rev: ${n.revisao} | ${n.status}`
  ).join("\n");
  return `Relatório de Monitoramento de Normas – ${hoje}\n${"─".repeat(50)}\n\n${lines}\n\nFontes:\n- sae.org (AS9100)\n- iso.org (ISO 9001 e ISO 14001)\n- anac.gov.br (RBAC 145)\n\nAtenciosamente,\nMonitor de Normas Técnicas`;
}

function openModal() {
  document.getElementById("modalPreview").textContent = buildEmailBody();
  document.getElementById("modalSuccess").style.display = "none";
  document.getElementById("sendBtn").style.display = "block";
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}

function sendEmail() {
  const body = buildEmailBody();
  const subject = encodeURIComponent(`Relatório de Monitoramento de Normas – ${hoje}`);
  window.location.href = `mailto:rmartins@ael.com.br?subject=${subject}&body=${encodeURIComponent(body)}`;
  document.getElementById("sendBtn").style.display = "none";
  document.getElementById("modalSuccess").style.display = "block";
}

// ── PWA INSTALL ───────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBanner").classList.add("show");
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("installBanner").classList.remove("show");
});

window.addEventListener("appinstalled", () => {
  document.getElementById("installBanner").classList.remove("show");
});

// ── SERVICE WORKER ────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(console.error);
}
</script>

</body>
</html>
